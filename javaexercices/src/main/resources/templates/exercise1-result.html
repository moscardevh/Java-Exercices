<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration Result</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/exercise1.css">
    <style th:inline="css">
    body::before {
        background-image: url("/images/bg-ex1.png");
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading">Registro</div>
        
        <div class="form" style="text-align: left; margin-top: 30px;">
            <p><strong>Nome:</strong> <span th:text="${nome}"></span></p>
            <p><strong>Idade:</strong> <span th:text="${idade}"></span> years</p>
            <p><strong>Altura:</strong> <span th:text="${#numbers.formatDecimal(altura, 1, 2)}"></span>m</p>
        </div>

        <a th:href="@{/exercise1}" class="submit">
            Back
        </a>
    </div>
</body>
</html>
