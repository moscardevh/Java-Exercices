<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercício 1</title>

  <!-- mesma fonte da home -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
  <!-- se quiser, pode criar outro CSS específico, mas o style.css atual já deve servir -->
</head>
<body>

  <div class="hero">
    <h1>Exercício 1</h1>
    <p>Cadastro simples — digite seus dados</p>
  </div>

  <div class="form-container">
    <form action="/exercicio1/result" method="get">
      <!-- método GET é simples; se quiser POST, adapta depois -->
      <div class="field">
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required />
      </div>

      <div class="field">
        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" name="idade" required min="0" />
      </div>

      <div class="field">
        <label for="altura">Altura (m):</label><br>
        <input type="text" id="altura" name="altura" required placeholder="ex: 1.75" />
      </div>

      <div class="field">
        <button type="submit" class="btn">
          <!-- ícone + texto, igual aos botões da home -->
          <svg class="sparkle" width="24" height="24" viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          <span class="text">Enviar</span>
        </button>
      </div>
    </form>
  </div>

</body>
</html>
